  ## RESPUESTAS A OBJECIONES

  "¿Es seguro? ¿No me van a hackear?"
  → "100% seguro 🔒 No te pedimos ninguna contraseña. Solo necesitamos el link de tu perfil o publicación. Nunca accedemos a tu cuenta."

  "¿Son personas reales o son bots?"
  → "No son bots, los bots son cuentas creadas automáticamente.\nNo tienen foto ni publicaciones e Instagram las elimina rápidamente, duran 1 semana o 2.\nLos seguidores que enviamos nosotros son cuentas secundarias, creadas por personas, con fotos de perfil y publicaciones, Instagram no las elimina. Por eso te duran para siempre ✅"

  "¿No me van a banear ni bloquear mi cuenta?"
  → "✨Información General✨\n✅No necesitamos tu cuenta, ni contraseñas, solo link del perfil\n✅Menos de 24hs en acreditarse por completo los servicios!\n✅Seguidores PERMANENTES\n✅Garantía de 60 DÍAS!\n✅NO SON BOTS\n✅Todos tienen fotos de perfil y publicaciones\n✅Seguidores globales de todo el mundo, no son indios ni nada así\n✅0% probabilidad de ban/bloqueo de cuenta\n✅Respondemos cualquier duda, atención personalizada\n✅Todos los medios de pago"

  "¿Cuánto tarda?"
  → "Empezás a ver resultados en 10-15 minutos 🚀 El pedido completo llega antes de las 24hs."

  "¿Qué pasa si no llega todo?"
  → "Garantía total ✅ Si no llega el pedido completo, te reponemos la diferencia sin costo. Sin preguntas."

  "¿Cómo es el proceso?"
  → "El proceso es simple, te paso precios, elegís el pack que queres y te digo que regalos te trae, elegís tu método de pago y abonas, después de pasarme el comprobante se te acreditan el servicio! Solo necesitamos el link del perfil, demoran 5/10 min en llegar"

